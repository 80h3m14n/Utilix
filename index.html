<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Utilix - Professional, functional developer tools. No fluff, just real utilities.">
    <title>Utilix - Real Developer Tools</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="header-top">
                <h1 class="logo">⚙️ UTILIX</h1>
                <p class="tagline">Real Tools for Real Developers</p>
            </div>
            <div class="search-header">
                <input type="text" id="globalSearch" class="search-input" placeholder="🔍 Find a tool...">
            </div>
        </div>
    </header>

    <nav class="navbar">
        <div class="container">
            <div class="nav-items">
                <a href="#" class="nav-link active" data-category="all">All</a>
                <a href="#" class="nav-link" data-category="text">Text</a>
                <a href="#" class="nav-link" data-category="encoding">Encoding</a>
                <a href="#" class="nav-link" data-category="crypto">Crypto</a>
                <a href="#" class="nav-link" data-category="generators">Generate</a>
                <a href="#" class="nav-link" data-category="formatters">Format</a>
                <a href="#" class="nav-link" data-category="datetime">Date/Time</a>
                <a href="#" class="nav-link" data-category="network">Network</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <div class="tools-container" id="toolsContainer"></div>
        </div>
    </main>

    <div class="tool-modal" id="toolModal">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-box">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="modal-close" id="modalCloseBtn">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="assets/js/tools.js"></script>
</body>

</html>
